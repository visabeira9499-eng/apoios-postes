<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Apoios dos Postes</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body, #map {
  height: 100%;
  margin: 0;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([40.95, -7.26], 12);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

</script>

</body>
</html>
