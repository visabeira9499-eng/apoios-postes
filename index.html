<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Apoios dos Postes</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body,#map{
height:100%;
margin:0;
padding:0;
}

#pesquisa{
position:absolute;
top:10px;
left:60px;
z-index:1000;
padding:8px;
width:200px;
}

#btnGPS{
position:absolute;
top:50px;
left:60px;
z-index:1000;
padding:8px;
cursor:pointer;
}

#btnSOS{
position:absolute;
top:90px;
left:60px;
z-index:1000;
padding:8px;
cursor:pointer;
}
</style>
</head>

<body>

<input id="pesquisa" placeholder="Pesquisar apoio (Name)">

<button id="btnGPS">📍 Localização</button>

<button id="btnSOS">🚨 Emergência</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([40.95,-7.26],12);

var apoiosLayer;
var listaApoios = [];

var osm = L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

var satelite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:19
}
);

L.control.layers(
{
"Mapa":osm,
"Satélite":satelite
}
).addTo(map);

fetch('Apoio.geojson')
.then(r=>r.json())
.then(data=>{

apoiosLayer = L.geoJSON(data,{

pointToLayer:function(feature,latlng){

return L.circleMarker(latlng,{
radius:7,
weight:2
});

},

onEachFeature:function(feature,layer){

let popup='';

if(feature.properties){

for(let campo in feature.properties){

popup += '<b>'+campo+'</b>: '
+ feature.properties[campo]
+ '<br>';

}

}

let nome = feature.properties?.Name || '';

listaApoios.push({
nome:nome,
layer:layer
});

if(feature.geometry.type==="Point"){

let lon = feature.geometry.coordinates[0];
let lat = feature.geometry.coordinates[1];

popup +=
'<br><a target="_blank" href="https://www.google.com/maps/search/?api=1&query='
+ lat + ',' + lon +
'">🧭 Navegar</a>';

}

layer.bindPopup(popup);

}

}).addTo(map);

map.fitBounds(apoiosLayer.getBounds());

});

fetch('Vias.geojson')
.then(r=>r.json())
.then(data=>{

L.geoJSON(data,{
style:{
color:'#ff6600',
weight:5
}
}).addTo(map);

})
.catch(err=>console.log(err));

document.getElementById('pesquisa')
.addEventListener('change',function(){

let valor = this.value.toLowerCase();

for(let i=0;i<listaApoios.length;i++){

if(listaApoios[i].nome.toLowerCase()===valor){

map.fitBounds(
listaApoios[i].layer.getBounds()
);

listaApoios[i].layer.openPopup();

break;
}

}

});

document.getElementById('btnGPS')
.onclick=function(){

map.locate({
setView:true,
maxZoom:18
});

};

map.on('locationfound',function(e){

L.marker(e.latlng)
.addTo(map)
.bindPopup('📍 Está aqui');

});

document.getElementById('btnSOS')
.onclick=function(){

let msg =
"🚨 Emergência\n\n" +
"112\n\n" +
"Bombeiros da Mêda\n279 883 122\n\n" +
"Bombeiros de Trancoso\n271 829 120";

alert(msg);

};

</script>

</body>
</html>
